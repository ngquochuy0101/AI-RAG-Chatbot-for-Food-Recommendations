version: '3.8'

services:
  # === Database (SQL Server 2022) ===
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: chatbot_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SuperStrongPassword123!
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - chatbot_network

  # === AI Service (Python FastAPI + RAG) ===
  backend_python:
    build:
      context: ../../backend/python
      dockerfile: Dockerfile
    container_name: chatbot_backend_python
    ports:
      - "8001:8001"
    volumes:
      - ../../data:/data
      - ../../models:/models
      - ../../sherpa-vietnamese-asr:/sherpa-vietnamese-asr
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONUNBUFFERED=1
      # Connect to Ollama running on the host machine
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    networks:
      - chatbot_network

  # === .NET Backend API ===
  backend_dotnet:
    build:
      context: ../../backend/dotnet
      dockerfile: Dockerfile
    container_name: chatbot_backend_dotnet
    ports:
      - "5200:5200"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=chatbot;User Id=sa;Password=SuperStrongPassword123!;TrustServerCertificate=True;
      - PythonApiUrl=http://backend_python:8001
      - Jwt__Key=Your_Super_Secret_Key_For_JWT_Authentication_Make_It_Long
    depends_on:
      - db
      - backend_python
    networks:
      - chatbot_network

  # === Angular Frontend ===
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: chatbot_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend_dotnet
    networks:
      - chatbot_network

networks:
  chatbot_network:
    driver: bridge

volumes:
  sql_data:

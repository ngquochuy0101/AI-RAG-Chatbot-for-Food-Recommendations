<div class="modal" [class.show]="show">
    <div class="modal-content">
        <span class="close" (click)="onClose.emit()">&times;</span>
        <h2>Đăng ký</h2>
        <form (ngSubmit)="register()">
            <div class="form-group">
                <label>Tên</label>
                <input type="text" [(ngModel)]="registerName" name="name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" [(ngModel)]="registerEmail" name="email" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" [(ngModel)]="registerPassword" name="password" required>
            </div>
            <button type="submit" class="brutal-btn brutal-btn-primary" style="width: 100%;">TẠO TÀI KHOẢN</button>
        </form>
        <p class="switch-auth">
            Đã có tài khoản? <a href="javascript:void(0)" (click)="onSwitchToLogin.emit()">Đăng nhập</a>
        </p>
    </div>
</div>

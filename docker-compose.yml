services:
  # === Web Server (PHP + Apache + Frontend) ===
  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web/Dockerfile
    container_name: hackathon_web
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=password
      - DB_NAME=chatbot
      - PYTHON_API_URL=http://ml_api:8001
    depends_on:
      - db
      - ml_api
    networks:
      - rag_network

  # === AI Service (FastAPI + LangChain) ===
  ml_api:
    build:
      context: ./backend/python
      dockerfile: Dockerfile
    container_name: hackathon_ml_api
    ports:
      - "8001:8001"
    volumes:
      - ./backend/python:/app
      - ./backend/python/models:/app/models
      - ./backend/python/vectorstores:/app/vectorstores
    env_file:
      - ./backend/python/.env
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - rag_network

  # === Database (MySQL 8.0) ===
  db:
    image: mysql:8.0
    container_name: hackathon_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: chatbot
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/database.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    networks:
      - rag_network

networks:
  rag_network:
    driver: bridge

volumes:
  mysql_data:

<div class="modal-overlay" *ngIf="show" (click)="onClose.emit()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Đặt lại mật khẩu</h2>
      <button class="close-btn" (click)="onClose.emit()">×</button>
    </div>
    
    <div class="modal-body">
      <p class="modal-desc">Nhập mã OTP và mật khẩu mới</p>
      
      <div class="form-group">
        <label for="code">Mã OTP (6 số)</label>
        <input 
          type="text" 
          id="code" 
          [(ngModel)]="code" 
          placeholder="123456"
          maxlength="6"
          class="form-input"
          [disabled]="isLoading"
        >
      </div>
      
      <div class="form-group">
        <label for="newPassword">Mật khẩu mới</label>
        <input 
          type="password" 
          id="newPassword" 
          [(ngModel)]="newPassword" 
          placeholder="Mật khẩu mới"
          class="form-input"
          [disabled]="isLoading"
        >
      </div>
      
      <div class="form-group">
        <label for="confirmPassword">Xác nhận mật khẩu</label>
        <input 
          type="password" 
          id="confirmPassword" 
          [(ngModel)]="confirmPassword" 
          placeholder="Nhập lại mật khẩu"
          class="form-input"
          [disabled]="isLoading"
        >
      </div>
      
      <div *ngIf="message" class="alert" [class.alert-error]="isError" [class.alert-success]="!isError">
        {{ message }}
      </div>
      
      <button 
        class="btn btn-primary btn-full" 
        (click)="resetPassword()"
        [disabled]="isLoading"
      >
        {{ isLoading ? 'Đang xử lý...' : 'Đặt lại mật khẩu' }}
      </button>
    </div>
    
    <div class="modal-footer">
      <button class="link-btn" (click)="goToLogin()">Quay lại đăng nhập</button>
    </div>
  </div>
</div>

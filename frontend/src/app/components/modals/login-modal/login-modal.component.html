<div class="modal" [class.show]="show">
    <div class="modal-content">
        <span class="close" (click)="onClose.emit()">&times;</span>
        <h2>Đăng nhập</h2>
        <form (ngSubmit)="login()">
            <div class="form-group">
                <label>Email</label>
                <input type="email" [(ngModel)]="loginEmail" name="email" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" [(ngModel)]="loginPassword" name="password" required>
            </div>
            <div class="form-links">
                <a href="javascript:void(0)" class="forgot-link" (click)="onForgotPassword.emit()">Quên mật khẩu?</a>
            </div>
            <button type="submit" class="brutal-btn brutal-btn-primary" style="width: 100%;">VÀO BẾP</button>
        </form>
        <p class="switch-auth">
            Chưa có tài khoản? <a href="javascript:void(0)" (click)="onSwitchToRegister.emit()">Đăng ký ngay</a>
        </p>
    </div>
</div>

<div class="modal-overlay" *ngIf="show" (click)="onClose.emit()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Quên mật khẩu</h2>
      <button class="close-btn" (click)="onClose.emit()">×</button>
    </div>
    
    <div class="modal-body">
      <p class="modal-desc">Nhập email đăng ký để nhận mã đặt lại mật khẩu</p>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="email" 
          placeholder="you@example.com"
          class="form-input"
          [disabled]="isLoading"
        >
      </div>
      
      <div *ngIf="message" class="alert" [class.alert-error]="isError" [class.alert-success]="!isError">
        {{ message }}
      </div>
      
      <button *ngIf="!otpSent"
        class="btn btn-primary btn-full" 
        (click)="requestReset()"
        [disabled]="isLoading"
      >
        {{ isLoading ? 'Đang gửi...' : 'Gửi mã xác nhận' }}
      </button>

      <button *ngIf="otpSent"
        class="btn btn-success btn-full" 
        (click)="continueToReset()"
      >
        Nhập mã OTP
      </button>
    </div>
    
    <div class="modal-footer">
      <span>Nhớ mật khẩu? </span>
      <button class="link-btn" (click)="goToLogin()">Đăng nhập</button>
    </div>
  </div>
</div>
